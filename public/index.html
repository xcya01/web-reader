<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebReader 本地版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .reader-content p { margin-bottom: 1em; line-height: 1.9; text-indent: 2em; }
        .theme-paper { background-color: #f5e6c8; color: #4a3b2a; }
        .theme-green { background-color: #c7edcc; color: #2d3a2d; }
        .theme-dark { background-color: #1a1a1a; color: #999; }
        .theme-white { background-color: #ffffff; color: #333; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
<div id="app" class="h-full flex flex-col" :class="currentTheme">
    
    <!-- 顶部导航 -->
    <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10" v-if="view !== 'reader'">
        <h1 class="text-xl font-bold text-indigo-600 cursor-pointer" @click="view = 'home'">📚 WebReader</h1>
        <div class="flex gap-4 text-sm">
            <button @click="view = 'home'" :class="{'text-indigo-600 font-bold': view==='home'}">搜索</button>
            <button @click="view = 'shelf'" :class="{'text-indigo-600 font-bold': view==='shelf'}">书架</button>
            <button @click="view = 'sources'" :class="{'text-indigo-600 font-bold': view==='sources'}">📦 书源</button>
        </div>
    </header>

    <!-- 搜索页 -->
    <main v-if="view === 'home'" class="flex-1 overflow-y-auto p-4 max-w-4xl mx-auto w-full">
        <div class="flex gap-2 mb-6 sticky top-0 bg-gray-100 py-2 z-10">
            <input v-model="searchQuery" @keyup.enter="doSearch" class="flex-1 border rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="输入书名搜索...">
            <button @click="doSearch" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">搜索</button>
        </div>
        <div v-if="loading" class="text-center py-10 text-gray-500">正在聚合搜索...</div>
        <div v-if="!loading && enabledSources.length === 0" class="text-center py-10 text-red-500">⚠️ 暂无启用的书源，请前往「📦 书源」添加</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div v-for="book in searchResults" :key="book.id" class="bg-white p-4 rounded-xl shadow-sm flex gap-4">
                <div class="w-16 h-24 bg-indigo-100 rounded flex items-center justify-center text-2xl shrink-0">📖</div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-bold text-lg truncate">{{ book.title }}</h3>
                    <p class="text-xs text-gray-500 mt-1">{{ book.author }} | {{ book.sourceName }}</p>
                    <div class="flex gap-2 mt-3">
                        <button @click="startRead(book)" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded">阅读</button>
                        <button @click="toggleShelf(book)" class="text-xs border px-3 py-1 rounded">{{ isInShelf(book.uniqueId) ? '移出书架' : '加入书架' }}</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 书架页 -->
    <main v-if="view === 'shelf'" class="flex-1 overflow-y-auto p-4 max-w-4xl mx-auto w-full">
        <h2 class="text-lg font-bold mb-4 border-b pb-2">我的书架</h2>
        <div v-if="shelf.length === 0" class="text-gray-400 text-center py-10">暂无藏书</div>
        <div class="space-y-3">
            <div v-for="item in shelf" :key="item.uniqueId" class="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm">
                <div @click="startRead(item)" class="cursor-pointer flex-1 min-w-0">
                    <div class="font-bold truncate">{{ item.title }}</div>
                    <div class="text-xs text-gray-500 truncate">读到: {{ item.lastChapter || '未读' }}</div>
                </div>
                <button @click="removeFromShelf(item.uniqueId)" class="text-red-400 text-xs ml-3 shrink-0">删除</button>
            </div>
        </div>
    </main>

    <!-- 书源管理页 -->
    <main v-if="view === 'sources'" class="flex-1 overflow-y-auto p-4 max-w-4xl mx-auto w-full">
        <h2 class="text-lg font-bold mb-4">书源管理</h2>
        <div class="bg-white p-4 rounded-xl shadow-sm mb-4">
            <textarea v-model="importText" rows="4" class="w-full border rounded-lg p-3 text-xs font-mono outline-none" placeholder='粘贴书源JSON数组'></textarea>
            <div class="flex gap-2 mt-2 items-center">
                <button @click="parseImport" class="bg-indigo-600 text-white px-4 py-1.5 rounded text-sm">导入</button>
                <span v-if="importMsg" class="text-xs" :class="importMsg.ok?'text-green-600':'text-red-500'">{{ importMsg.text }}</span>
            </div>
        </div>
        <div class="space-y-2">
            <div v-for="(src, idx) in sources" :key="src.id" class="bg-white p-3 rounded-lg flex items-center gap-3 shadow-sm">
                <input type="checkbox" v-model="src.enabled" @change="saveSources" class="accent-indigo-600">
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-sm truncate">{{ src.name }}</div>
                    <div class="text-xs text-gray-400 truncate">{{ src.baseUrl }}</div>
                </div>
                <button @click="deleteSource(idx)" class="text-gray-300 hover:text-red-500">×</button>
            </div>
        </div>
    </main>

    <!-- 阅读器 -->
    <div v-if="view === 'reader'" class="fixed inset-0 z-50 flex flex-col transition-colors duration-300" :class="currentTheme">
        <div class="h-12 flex items-center justify-between px-4 border-b opacity-90" :class="isDark ? 'border-gray-700' : 'border-gray-200'">
            <button @click="view = 'home'" class="text-lg">←</button>
            <span class="font-bold truncate max-w-[50%] text-sm">{{ currentBook?.title }}</span>
            <button @click="addBookmark" class="text-indigo-500 text-sm">+ 书签</button>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-8 max-w-3xl mx-auto w-full reader-content" :style="{ fontSize: fontSize + 'px' }">
            <h2 class="text-xl font-bold mb-6 text-center">{{ currentChapterTitle }}</h2>
            <div v-html="currentContent"></div>
            <div class="flex justify-between py-10 mt-8 border-t" :class="isDark ? 'border-gray-700' : 'border-gray-200'">
                <button @click="prevChapter" :disabled="chapterIndex <= 0" class="px-4 py-2 rounded border disabled:opacity-30 text-sm">上一章</button>
                <button @click="nextChapter" :disabled="chapterIndex >= chapters.length - 1" class="px-4 py-2 rounded border disabled:opacity-30 text-sm">下一章</button>
            </div>
        </div>
        <div class="h-12 flex items-center justify-around text-sm border-t" :class="isDark ? 'border-gray-700' : 'border-gray-200'">
            <button @click="fontSize = Math.max(14, fontSize - 2)">A-</button>
            <button @click="fontSize = Math.min(32, fontSize + 2)">A+</button>
            <div class="flex gap-2">
                <div @click="setTheme('theme-white')" class="w-5 h-5 rounded-full bg-white border cursor-pointer"></div>
                <div @click="setTheme('theme-paper')" class="w-5 h-5 rounded-full bg-[#f5e6c8] border cursor-pointer"></div>
                <div @click="setTheme('theme-green')" class="w-5 h-5 rounded-full bg-[#c7edcc] border cursor-pointer"></div>
                <div @click="setTheme('theme-dark')" class="w-5 h-5 rounded-full bg-[#1a1a1a] border cursor-pointer"></div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;
createApp({
    setup() {
        const view = ref('home');
        const searchQuery = ref('');
        const loading = ref(false);
        const searchResults = ref([]);
        const shelf = ref([]);
        const sources = ref([]);
        const importText = ref('');
        const importMsg = ref(null);
        
        const currentBook = ref(null);
        const chapters = ref([]);
        const chapterIndex = ref(0);
        const currentContent = ref('');
        const currentChapterTitle = ref('');
        const fontSize = ref(18);
        const currentTheme = ref('theme-paper');

        // 代理请求
        const proxyFetch = async (url) => {
            const res = await fetch(`/api/proxy?url=${encodeURIComponent(url)}`);
            if (!res.ok) throw new Error(`请求失败: ${res.status}`);
            return res.text();
        };

        // 启用中的书源
        const enabledSources = computed(() => sources.value.filter(s => s.enabled));

        // 搜索
        const doSearch = async () => {
            if (!searchQuery.value.trim() || enabledSources.value.length === 0) return;
            loading.value = true;
            searchResults.value = [];
            const keyword = searchQuery.value.trim();
            
            const promises = enabledSources.value.map(async (source) => {
                try {
                    const url = source.baseUrl + source.rules.search.url.replace('{{keyword}}', encodeURIComponent(keyword));
                    const html = await proxyFetch(url);
                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    const items = doc.querySelectorAll(source.rules.search.list);
                    return Array.from(items).slice(0, 5).map(item => ({
                        uniqueId: `${source.id}_${item.querySelector(source.rules.search.detailUrl)?.getAttribute('href')}`,
                        detailUrl: item.querySelector(source.rules.search.detailUrl)?.getAttribute('href'),
                        title: item.querySelector(source.rules.search.title)?.textContent?.trim(),
                        author: item.querySelector(source.rules.search.author)?.textContent?.trim() || '未知',
                        sourceId: source.id,
                        sourceName: source.name,
                        rules: source.rules
                    })).filter(b => b.title && b.detailUrl);
                } catch (e) { console.error(`${source.name} 搜索失败`, e); return []; }
            });
            
            const results = await Promise.allSettled(promises);
            searchResults.value = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
            loading.value = false;
        };

        // 阅读
        const startRead = async (book) => {
            currentBook.value = book;
            chapterIndex.value = book.lastChapterIndex || 0;
            try {
                const tocUrl = book.detailUrl.startsWith('http') ? book.detailUrl : 
                    (sources.value.find(s=>s.id===book.sourceId)?.baseUrl || '') + book.detailUrl;
                const html = await proxyFetch(tocUrl);
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const tocItems = doc.querySelectorAll(book.rules.toc.list);
                chapters.value = Array.from(tocItems).map(a => ({
                    title: a.textContent?.trim(),
                    url: a.getAttribute('href')
                })).filter(c => c.url && c.title);
                
                if (chapters.value.length > 0) {
                    await loadChapter(chapterIndex.value);
                    view.value = 'reader';
                } else { alert('目录解析失败'); }
            } catch (e) { alert('加载失败: ' + e.message); }
        };

        const loadChapter = async (idx) => {
            if (idx < 0 || idx >= chapters.value.length) return;
            chapterIndex.value = idx;
            currentChapterTitle.value = chapters.value[idx].title;
            currentContent.value = '<p style="text-align:center;color:#999;">加载中...</p>';
            if (currentBook.value) {
                currentBook.value.lastChapter = currentChapterTitle.value;
                currentBook.value.lastChapterIndex = idx;
                updateShelfProgress();
            }
            try {
                const baseUrl = sources.value.find(s=>s.id===currentBook.value.sourceId)?.baseUrl || '';
                const fullUrl = chapters.value[idx].url.startsWith('http') ? chapters.value[idx].url : baseUrl + chapters.value[idx].url;
                const html = await proxyFetch(fullUrl);
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const el = doc.querySelector(currentBook.value.rules.content.selector);
                if (el) {
                    (currentBook.value.rules.content.filter || []).forEach(sel => el.querySelectorAll(sel).forEach(e => e.remove()));
                    currentContent.value = el.innerHTML;
                } else { currentContent.value = '<p>内容解析失败</p>'; }
            } catch (e) { currentContent.value = `<p>加载失败: ${e.message}</p>`; }
            window.scrollTo(0, 0);
        };

        const prevChapter = () => loadChapter(chapterIndex.value - 1);
        const nextChapter = () => loadChapter(chapterIndex.value + 1);

        // 书架
        const toggleShelf = (book) => {
            const idx = shelf.value.findIndex(b => b.uniqueId === book.uniqueId);
            if (idx > -1) shelf.value.splice(idx, 1);
            else shelf.value.unshift({...book, lastChapter: '未读', lastChapterIndex: 0});
            saveShelf();
        };
        const isInShelf = (id) => shelf.value.some(b => b.uniqueId === id);
        const removeFromShelf = (id) => { shelf.value = shelf.value.filter(b => b.uniqueId !== id); saveShelf(); };
        const updateShelfProgress = () => {
            const idx = shelf.value.findIndex(b => b.uniqueId === currentBook.value.uniqueId);
            if (idx > -1) { shelf.value[idx].lastChapter = currentBook.value.lastChapter; shelf.value[idx].lastChapterIndex = currentBook.value.lastChapterIndex; saveShelf(); }
        };
        const saveShelf = () => localStorage.setItem('wr_shelf', JSON.stringify(shelf.value));

        // 书源管理
        const parseImport = () => {
            try {
                const data = JSON.parse(importText.value);
                const list = Array.isArray(data) ? data : [data];
                let added = 0;
                list.forEach(s => {
                    if (s.id && s.name && s.rules) {
                        const existIdx = sources.value.findIndex(x => x.id === s.id);
                        if (existIdx > -1) sources.value[existIdx] = {...sources.value[existIdx], ...s};
                        else sources.value.push({...s, enabled: true});
                        added++;
                    }
                });
                saveSources();
                importMsg.value = { ok: true, text: `✅ 成功导入 ${added} 个书源` };
                importText.value = '';
            } catch (e) { importMsg.value = { ok: false, text: `❌ JSON解析失败` }; }
        };
        const deleteSource = (idx) => { sources.value.splice(idx, 1); saveSources(); };
        const saveSources = () => localStorage.setItem('wr_sources', JSON.stringify(sources.value));

        // 书签(本地)
        const addBookmark = () => {
            if (!currentBook.value) return;
            const marks = JSON.parse(localStorage.getItem('wr_bookmarks') || '{}');
            if (!marks[currentBook.value.uniqueId]) marks[currentBook.value.uniqueId] = [];
            marks[currentBook.value.uniqueId].push({ chapterIndex: chapterIndex.value, title: currentChapterTitle.value, time: new Date().toLocaleString() });
            localStorage.setItem('wr_bookmarks', JSON.stringify(marks));
            alert('书签已保存');
        };

        // 主题
        const setTheme = (t) => { currentTheme.value = t; };
        const isDark = computed(() => currentTheme.value === 'theme-dark');

        onMounted(() => {
            const s = localStorage.getItem('wr_shelf'); if (s) shelf.value = JSON.parse(s);
            const src = localStorage.getItem('wr_sources'); if (src) sources.value = JSON.parse(src);
        });

        return { view, searchQuery, loading, searchResults, enabledSources, doSearch, shelf, toggleShelf, isInShelf, removeFromShelf, sources, importText, importMsg, parseImport, deleteSource, saveSources, currentBook, currentChapterTitle, currentContent, chapterIndex, chapters, prevChapter, nextChapter, fontSize, currentTheme, setTheme, isDark, addBookmark };
    }
}).mount('#app');
</script>
</body>
</html>
